language: node_js # 设置语言
node_js: stable # 设置相应版本
cache:
    apt: true
    directories:
        - node_modules # 缓存不经常更改的内容
before_install:
    - npm install hexo-cli -g
install:
    - npm install # 安装hexo及插件
    - npm install --save hexo-helper-live2d
    - npm install live2d-widget-model-haru
script:
    - cd node_modules/live2d-widget-model-haru/
    - mkdir 02
    - cp package.json 02/
    - hexo clean # 清除
    - hexo g # 生成
after_script:
    - git clone https://${GH_REF} .deploy_git
    - cd .deploy_git
    - git checkout master
    - cd ../
    - mv .deploy_git/.git/ ./public/
    - cd ./public
    - git config user.name "Nickqiaoo"
    - git config user.email "nickqiaoo@gmail.com"
    - git add .
    - git commit -m "Travis CI Auto Builder"
    - git push --force --quiet "https://${GH_TOKEN}@${GH_REF}" master:master
branches:
    only:
        - source # 只监测source分支
env:
    global:
        - GH_REF: github.com/Nickqiaoo/nickqiaoo.github.io.git #设置GH_REF，注意更改成自己的仓库地址